<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>길드전 결과</title>
<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/result.css">
<style>
  body { font-family: sans-serif; margin: 20px; }
  h1 { margin-bottom: 10px; }
  .section { display: flex; gap: 10px; margin-bottom: 20px; }
  .container { border: 1px solid #ccc; padding: 10px; flex: 1; min-height: 200px; }
  .row { display: flex; gap: 6px; margin-bottom: 6px; align-items: center; }
  label { width: 40px; }
  select { flex: 1; padding: 4px 6px; }
</style>
</head>
<body>

    <div id="loading-overlay">
    <div id="loading-text">최적 조합 계산 중... (0%)</div>
    <div class="progress-bar">
        <div id="loading-fill" class="progress-fill"></div>
    </div>
    <div style="font-size:14px; margin-top:10px; color:#ddd;">잠시만 기다려주세요.</div>
</div>

<h1>버프 / 너프 설정</h1>
<div class="section" id="config-section">
  <div class="container config-box" id="buff-container">
    <h2>버프</h2>
    <div class="config-row-wrapper">
      <div class="config-group">
        <label>속성</label>
        <div class="select-column">
          <select id="buff-attr">
            <option>선택</option><option>땅</option><option>물</option><option>불</option><option>바람</option>
            <option>빛</option><option>어둠</option><option>여명</option><option>황혼</option><option>악몽</option>
          </select>
          <select id="buff-stat1">
            <option value="선택">선택</option>
  <option value="체">HP</option>
  <option value="공">ATK</option>
  <option value="방">DEF</option>
          </select>
        </div>
      </div>
      <div class="config-group">
        <label>타입</label>
        <div class="select-column">
          <select id="buff-type">
            <option>선택</option><option>체</option><option>공</option><option>방</option>
            <option>체공</option><option>체방</option><option>공방</option>
          </select>
          <select id="buff-stat2">
          <option value="선택">선택</option>
  <option value="체">HP</option>
  <option value="공">ATK</option>
  <option value="방">DEF</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <div class="container config-box" id="debuff-container">
    <h2>너프</h2>
    <div class="config-row-wrapper">
      <div class="config-group">
        <label>속성</label>
        <div class="select-column">
          <select id="debuff-attr">
            <option>선택</option><option>땅</option><option>물</option><option>불</option><option>바람</option>
            <option>빛</option><option>어둠</option><option>여명</option><option>황혼</option><option>악몽</option>
          </select>
          <select id="debuff-stat1">
            <option value="선택">선택</option>
  <option value="체">HP</option>
  <option value="공">ATK</option>
  <option value="방">DEF</option>
          </select>
        </div>
      </div>
      <div class="config-group">
        <label>타입</label>
        <div class="select-column">
          <select id="debuff-type">
            <option>선택</option><option>체</option><option>공</option><option>방</option>
            <option>체공</option><option>체방</option><option>공방</option>
          </select>
          <select id="debuff-stat2">
            <option value="선택">선택</option>
  <option value="체">HP</option>
  <option value="공">ATK</option>
  <option value="방">DEF</option>
          </select>
        </div>
      </div>
    </div>
  </div>
</div>
<div style="display: flex; justify-content: center; gap: 24px; margin-bottom: 10px; flex-wrap: wrap;">
  <div>
    <label style="font-weight: bold; margin-right: 6px;">예비 정령:</label>
    <select id="reserve-count" style="padding: 6px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px;">
      <option value="0">미사용</option>
      <option value="1">1마리</option>
      <option value="2">2마리</option>
      <option value="3">전부</option>
    </select>
  </div>
  <div>
    <label style="font-weight: bold; margin-right: 6px;">예비/해제 버프:</label>
    <select id="reserve-buff-mode" style="padding: 6px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px;">
      <option value="2buff">2벞</option>
      <option value="1buff">1벞</option>
      <option value="both">전체</option>
    </select>
  </div>
  <div>
    <label style="font-weight: bold; margin-right: 6px;">예비 속성/타입:</label>
    <select id="reserve-type-mode" style="padding: 6px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px;">
      <option value="asis">그대로</option>
      <option value="attrUnified">속성 통일</option>
      <option value="typeUnified">타입 통일</option>
      <option value="allUnified">전체 통일</option>
    </select>
  </div>
</div>
<div style="display: flex; justify-content: center; gap: 24px; margin-bottom: 15px; flex-wrap: wrap;">
  <div>
    <label style="font-weight: bold; margin-right: 6px;">정령 해제:</label>
    <select id="spirit-unlock" style="padding: 6px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px;">
      <option value="off">미설정</option>
      <option value="typeFixed">타입만 고정</option>
      <option value="all">전체</option>
    </select>
  </div>
  <div>
    <label style="font-weight: bold; margin-right: 6px;">최대 자원:</label>
    <select id="max-resource" style="padding: 6px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px;">
      <option value="off">미사용</option>
      <option value="preview">버프참고만</option>
      <option value="result">결과만</option>
      <option value="all">전체</option>
    </select>
  </div>
  <div>
    <label style="font-weight: bold; margin-right: 6px;">자원 종류:</label>
    <select id="max-resource-type" style="padding: 6px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px;">
      <option value="all">전체</option>
      <option value="pen">팬던트</option>
      <option value="acc">장신구</option>
      <option value="gem">젬</option>
      <option value="pen+acc">팬던트+장신구</option>
      <option value="pen+gem">팬던트+젬</option>
      <option value="acc+gem">장신구+젬</option>
    </select>
  </div>
</div>
<div style="text-align: center; margin-bottom: 30px;">
  <button id="calc-btn" style="padding: 15px 40px; font-size: 18px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 8px;">
    최적 조합 계산하기
  </button>
</div>

<h1>결과 (Top 3)</h1>
<div id="result-container">
  <div class="container result-card" id="result1">
    <h3>1순위</h3>
    <div class="vval-display">-</div>
  </div>
  <div class="container result-card" id="result2">
    <h3>2순위</h3>
    <div class="vval-display">-</div>
  </div>
  <div class="container result-card" id="result3">
    <h3>3순위</h3>
    <div class="vval-display">-</div>
  </div>
</div>

<script src="js/shared.js"></script>
<script src="js/result.js"></script>
</body>
</html>
